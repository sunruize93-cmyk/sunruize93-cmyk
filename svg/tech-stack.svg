<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480" viewBox="0 0 480 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/><stop offset="100%" stop-color="#0d1537"/>
    </linearGradient>
    <linearGradient id="tG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    @keyframes fadeIn { 0% { opacity:0; } 100% { opacity:1; } }
    @keyframes pulse { 0%,100% { opacity:0.4;r:3; } 50% { opacity:1;r:5; } }
    @keyframes borderP { 0%,100% { stroke-opacity:0.15; } 50% { stroke-opacity:0.3; } }
    .row { animation: fadeIn 0.5s ease-out both; }
    .label { font-family:'Segoe UI',system-ui,sans-serif; font-size:13px; fill:#e0e6f0; }
    .pct { font-family:'SFMono-Regular',Consolas,monospace; font-size:13px; font-weight:600; }
    .track { fill:rgba(255,255,255,0.06); }
    .dot { animation: pulse 2s ease-in-out infinite; opacity:0; }
    .border { animation: borderP 4s ease-in-out infinite; }
  </style>
  <rect x="1" y="1" width="478" height="478" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="478" height="478" rx="16" fill="none" stroke="#00d4ff" stroke-width="1" class="border"/>
  <text x="240" y="45" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="18" font-weight="700" letter-spacing="3" fill="url(#tG)" filter="url(#glow)">⚡ TECH STACK</text>
  
    <g class="row" style="animation-delay:0.3s">
      <text x="50" y="75" class="label">HTML</text>
      <text x="430" y="75" text-anchor="end" class="pct" fill="#E34F26">47.0%</text>
      <rect x="50" y="81" width="380" height="8" rx="4" class="track"/>
      <rect x="50" y="81" width="178.42109122909946" height="8" rx="4" fill="#E34F26" opacity="0.85">
        <animate attributeName="width" from="0" to="178.42109122909946" dur="1.2s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
      </rect>
      <circle cx="228.42109122909946" cy="85" r="3" fill="#E34F26" class="dot" style="animation-delay:1.5s"/>
    </g>
    <g class="row" style="animation-delay:0.4s">
      <text x="50" y="117" class="label">Python</text>
      <text x="430" y="117" text-anchor="end" class="pct" fill="#3572A5">34.3%</text>
      <rect x="50" y="123" width="380" height="8" rx="4" class="track"/>
      <rect x="50" y="123" width="130.23369512075877" height="8" rx="4" fill="#3572A5" opacity="0.85">
        <animate attributeName="width" from="0" to="130.23369512075877" dur="1.2s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
      </rect>
      <circle cx="180.23369512075877" cy="127" r="3" fill="#3572A5" class="dot" style="animation-delay:1.6s"/>
    </g>
    <g class="row" style="animation-delay:0.5s">
      <text x="50" y="159" class="label">JavaScript</text>
      <text x="430" y="159" text-anchor="end" class="pct" fill="#F7DF1E">18.8%</text>
      <rect x="50" y="165" width="380" height="8" rx="4" class="track"/>
      <rect x="50" y="165" width="71.34521365014177" height="8" rx="4" fill="#F7DF1E" opacity="0.85">
        <animate attributeName="width" from="0" to="71.34521365014177" dur="1.2s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/>
      </rect>
      <circle cx="121.34521365014177" cy="169" r="3" fill="#F7DF1E" class="dot" style="animation-delay:1.7s"/>
    </g>
</svg>