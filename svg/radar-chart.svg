<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480" viewBox="0 0 480 480">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#0d1537"/>
    </linearGradient>
    <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="polyGlow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="dotGlow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    @keyframes drawPoly {
      0% { stroke-dashoffset: 800; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes pulse { 0%,100% { opacity: 0.6; r: 4; } 50% { opacity: 1; r: 6; } }
    @keyframes float { 0%,100% { transform: translateY(0); opacity: 0.12; } 50% { transform: translateY(-15px); opacity: 0.3; } }
    @keyframes borderPulse { 0%,100% { stroke-opacity: 0.15; } 50% { stroke-opacity: 0.3; } }
    @keyframes fillFade { 0% { fill-opacity: 0; } 100% { fill-opacity: 0.12; } }
    .grid { stroke: rgba(0,212,255,0.08); stroke-width: 1; fill: none; }
    .axis { stroke: rgba(0,212,255,0.12); stroke-width: 1; }
    .data-poly { 
      fill: rgba(0,212,255,0.12); 
      stroke: #00d4ff; 
      stroke-width: 2; 
      stroke-dasharray: 800; 
      animation: drawPoly 2s ease-out 0.5s both;
    }
    .data-fill {
      fill: rgba(0,212,255,0.12);
      stroke: none;
      animation: fillFade 1s ease-out 2s both;
      fill-opacity: 0;
    }
    .vertex { animation: pulse 2.5s ease-in-out infinite; }
    .label { font-family: 'Segoe UI',system-ui,sans-serif; font-size: 12px; fill: #e0e6f0; animation: fadeIn 0.5s ease-out both; }
    .score { font-family: 'SFMono-Regular',Consolas,monospace; font-size: 11px; fill: #00d4ff; font-weight: 600; animation: fadeIn 0.5s ease-out both; }
    .particle { animation: float 8s ease-in-out infinite; }
    .border { animation: borderPulse 4s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect x="1" y="1" width="478" height="478" rx="16" ry="16" fill="url(#bgGrad)"/>
  <rect x="1" y="1" width="478" height="478" rx="16" ry="16" fill="none" stroke="#00d4ff" stroke-width="1" class="border"/>

  <!-- Floating Particles -->
  <circle cx="60" cy="80" r="1" fill="#00d4ff" class="particle" style="animation-delay:0s"/>
  <circle cx="420" cy="60" r="1.2" fill="#7c3aed" class="particle" style="animation-delay:2s"/>
  <circle cx="380" cy="420" r="0.8" fill="#00d4ff" class="particle" style="animation-delay:4s"/>
  <circle cx="100" cy="400" r="1" fill="#a855f7" class="particle" style="animation-delay:3s"/>
  <circle cx="440" cy="250" r="0.9" fill="#00d4ff" class="particle" style="animation-delay:5s"/>

  <!-- Title -->
  <text x="240" y="42" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="18" font-weight="700" letter-spacing="3" fill="url(#scoreGrad)" filter="url(#glow)">🧬 DEVELOPER DNA</text>

  <!-- Radar Chart - Center at (240, 225), Radius 130 -->
  <!-- 
    Hexagon vertices at radius R from center (240, 225):
    Axis 0 (top):           (240, 95)      = (240+0, 225-130)
    Axis 1 (top-right):     (352.6, 160)   = (240+130*sin60, 225-130*cos60)
    Axis 2 (bottom-right):  (352.6, 290)   = (240+130*sin60, 225+130*cos60)  
    Axis 3 (bottom):        (240, 355)     = (240+0, 225+130)
    Axis 4 (bottom-left):   (127.4, 290)   = (240-130*sin60, 225+130*cos60)
    Axis 5 (top-left):      (127.4, 160)   = (240-130*sin60, 225-130*cos60)
  -->

  <!-- Grid hexagons - 25%, 50%, 75%, 100% -->
  <!-- 25% (R=32.5) -->
  <polygon points="240,192.5 268.2,208.75 268.2,241.25 240,257.5 211.8,241.25 211.8,208.75" class="grid"/>
  <!-- 50% (R=65) -->
  <polygon points="240,160 296.3,192.5 296.3,257.5 240,290 183.7,257.5 183.7,192.5" class="grid"/>
  <!-- 75% (R=97.5) -->
  <polygon points="240,127.5 324.4,176.25 324.4,273.75 240,322.5 155.6,273.75 155.6,176.25" class="grid"/>
  <!-- 100% (R=130) -->
  <polygon points="240,95 352.6,160 352.6,290 240,355 127.4,290 127.4,160" class="grid"/>

  <!-- Axis lines -->
  <line x1="240" y1="225" x2="240" y2="95" class="axis"/>
  <line x1="240" y1="225" x2="352.6" y2="160" class="axis"/>
  <line x1="240" y1="225" x2="352.6" y2="290" class="axis"/>
  <line x1="240" y1="225" x2="240" y2="355" class="axis"/>
  <line x1="240" y1="225" x2="127.4" y2="290" class="axis"/>
  <line x1="240" y1="225" x2="127.4" y2="160" class="axis"/>

  <!-- Data polygon
    Values: Frontend 90, Backend 85, DevOps 75, System Design 80, Problem Solving 95, Leadership 70
    Scale factor = value/100
    
    Frontend (90%): (240, 225-130*0.9) = (240, 108)
    Backend (85%): (240+130*0.85*sin60, 225-130*0.85*cos60) = (240+95.7, 225-55.25) = (335.7, 169.75)
    DevOps (75%): (240+130*0.75*sin60, 225+130*0.75*cos60) = (240+84.4, 225+48.75) = (324.4, 273.75)
    System Design (80%): (240, 225+130*0.8) = (240, 329)
    Problem Solving (95%): (240-130*0.95*sin60, 225+130*0.95*cos60) = (240-106.97, 225+61.75) = (133.03, 286.75)
    Leadership (70%): (240-130*0.7*sin60, 225-130*0.7*cos60) = (240-78.8, 225-45.5) = (161.2, 179.5)
  -->
  <polygon points="240,108 335.7,169.75 324.4,273.75 240,329 133.03,286.75 161.2,179.5" class="data-fill"/>
  <polygon points="240,108 335.7,169.75 324.4,273.75 240,329 133.03,286.75 161.2,179.5" class="data-poly" filter="url(#polyGlow)"/>

  <!-- Vertex dots -->
  <circle cx="240" cy="108" r="4" fill="#00d4ff" class="vertex" filter="url(#dotGlow)" style="animation-delay:0s"/>
  <circle cx="335.7" cy="169.75" r="4" fill="#00d4ff" class="vertex" filter="url(#dotGlow)" style="animation-delay:0.4s"/>
  <circle cx="324.4" cy="273.75" r="4" fill="#00d4ff" class="vertex" filter="url(#dotGlow)" style="animation-delay:0.8s"/>
  <circle cx="240" cy="329" r="4" fill="#00d4ff" class="vertex" filter="url(#dotGlow)" style="animation-delay:1.2s"/>
  <circle cx="133.03" cy="286.75" r="4" fill="#00d4ff" class="vertex" filter="url(#dotGlow)" style="animation-delay:1.6s"/>
  <circle cx="161.2" cy="179.5" r="4" fill="#00d4ff" class="vertex" filter="url(#dotGlow)" style="animation-delay:2.0s"/>

  <!-- Labels -->
  <!-- Frontend (top) -->
  <text x="240" y="78" text-anchor="middle" class="label" style="animation-delay:0.5s">Frontend</text>
  <text x="240" y="92" text-anchor="middle" class="score" style="animation-delay:0.6s">90</text>

  <!-- Backend (top-right) -->
  <text x="370" y="155" text-anchor="start" class="label" style="animation-delay:0.7s">Backend</text>
  <text x="370" y="169" text-anchor="start" class="score" style="animation-delay:0.8s">85</text>

  <!-- DevOps (bottom-right) -->
  <text x="370" y="293" text-anchor="start" class="label" style="animation-delay:0.9s">DevOps</text>
  <text x="370" y="307" text-anchor="start" class="score" style="animation-delay:1.0s">75</text>

  <!-- System Design (bottom) -->
  <text x="240" y="378" text-anchor="middle" class="label" style="animation-delay:1.1s">System Design</text>
  <text x="240" y="392" text-anchor="middle" class="score" style="animation-delay:1.2s">80</text>

  <!-- Problem Solving (bottom-left) -->
  <text x="110" y="293" text-anchor="end" class="label" style="animation-delay:1.3s">Problem Solving</text>
  <text x="110" y="307" text-anchor="end" class="score" style="animation-delay:1.4s">95</text>

  <!-- Leadership (top-left) -->
  <text x="110" y="155" text-anchor="end" class="label" style="animation-delay:1.5s">Leadership</text>
  <text x="110" y="169" text-anchor="end" class="score" style="animation-delay:1.6s">70</text>

  <!-- Overall Score -->
  <line x1="120" y1="420" x2="360" y2="420" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
  <text x="240" y="448" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#8892b0" letter-spacing="2">OVERALL SCORE</text>
  <text x="240" y="470" text-anchor="middle" font-family="'SFMono-Regular',Consolas,monospace" font-size="22" font-weight="700" fill="url(#scoreGrad)" filter="url(#glow)">82.5 / 100</text>
</svg>
