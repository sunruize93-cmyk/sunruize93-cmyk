<svg xmlns="http://www.w3.org/2000/svg" width="840" height="460" viewBox="0 0 840 460">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#0d1537"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="barGlow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <!-- Skill bar gradients -->
    <linearGradient id="g0" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#3572A5" stop-opacity="0.8"/><stop offset="100%" stop-color="#3572A5"/></linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#3178C6" stop-opacity="0.8"/><stop offset="100%" stop-color="#3178C6"/></linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#F7DF1E" stop-opacity="0.8"/><stop offset="100%" stop-color="#F7DF1E"/></linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#DEA584" stop-opacity="0.8"/><stop offset="100%" stop-color="#DEA584"/></linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#00ADD8" stop-opacity="0.8"/><stop offset="100%" stop-color="#00ADD8"/></linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#61DAFB" stop-opacity="0.8"/><stop offset="100%" stop-color="#61DAFB"/></linearGradient>
    <linearGradient id="g6" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#339933" stop-opacity="0.8"/><stop offset="100%" stop-color="#339933"/></linearGradient>
    <linearGradient id="g7" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#2496ED" stop-opacity="0.8"/><stop offset="100%" stop-color="#2496ED"/></linearGradient>
    <linearGradient id="g8" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#326CE5" stop-opacity="0.8"/><stop offset="100%" stop-color="#326CE5"/></linearGradient>
    <linearGradient id="g9" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4169E1" stop-opacity="0.8"/><stop offset="100%" stop-color="#4169E1"/></linearGradient>
    <linearGradient id="titleGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <clipPath id="clip0"><rect x="40" y="88" width="0" height="10" rx="5"><animate attributeName="width" from="0" to="342" dur="1.5s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/></rect></clipPath>
    <clipPath id="clip1"><rect x="40" y="128" width="0" height="10" rx="5"><animate attributeName="width" from="0" to="324" dur="1.5s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/></rect></clipPath>
    <clipPath id="clip2"><rect x="40" y="168" width="0" height="10" rx="5"><animate attributeName="width" from="0" to="317" dur="1.5s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/></rect></clipPath>
    <clipPath id="clip3"><rect x="40" y="208" width="0" height="10" rx="5"><animate attributeName="width" from="0" to="281" dur="1.5s" begin="0.6s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/></rect></clipPath>
    <clipPath id="clip4"><rect x="40" y="248" width="0" height="10" rx="5"><animate attributeName="width" from="0" to="270" dur="1.5s" begin="0.7s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/></rect></clipPath>
    <clipPath id="clip5"><rect x="440" y="88" width="0" height="10" rx="5"><animate attributeName="width" from="0" to="331" dur="1.5s" begin="0.35s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/></rect></clipPath>
    <clipPath id="clip6"><rect x="440" y="128" width="0" height="10" rx="5"><animate attributeName="width" from="0" to="306" dur="1.5s" begin="0.45s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/></rect></clipPath>
    <clipPath id="clip7"><rect x="440" y="168" width="0" height="10" rx="5"><animate attributeName="width" from="0" to="288" dur="1.5s" begin="0.55s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/></rect></clipPath>
    <clipPath id="clip8"><rect x="440" y="208" width="0" height="10" rx="5"><animate attributeName="width" from="0" to="252" dur="1.5s" begin="0.65s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/></rect></clipPath>
    <clipPath id="clip9"><rect x="440" y="248" width="0" height="10" rx="5"><animate attributeName="width" from="0" to="295" dur="1.5s" begin="0.75s" fill="freeze" calcMode="spline" keySplines="0.25 0.46 0.45 0.94"/></rect></clipPath>
  </defs>
  <style>
    @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes pulse { 0%,100% { opacity: 0.5; r: 3; } 50% { opacity: 1; r: 5; } }
    @keyframes float { 0%,100% { transform: translateY(0); opacity: 0.15; } 50% { transform: translateY(-20px); opacity: 0.35; } }
    @keyframes borderPulse { 0%,100% { stroke-opacity: 0.15; } 50% { stroke-opacity: 0.3; } }
    .label { font-family: 'Segoe UI',system-ui,sans-serif; font-size: 13px; fill: #e0e6f0; }
    .pct { font-family: 'SFMono-Regular',Consolas,monospace; font-size: 13px; font-weight: 600; }
    .track { fill: rgba(255,255,255,0.06); }
    .title { font-family: 'Segoe UI',system-ui,sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 3px; fill: url(#titleGlow); }
    .dot { animation: pulse 2s ease-in-out infinite; }
    .particle { animation: float 8s ease-in-out infinite; }
    .border { animation: borderPulse 4s ease-in-out infinite; }
    .row { animation: fadeIn 0.6s ease-out both; }
  </style>

  <!-- Background -->
  <rect x="1" y="1" width="838" height="458" rx="16" ry="16" fill="url(#bgGrad)"/>
  <rect x="1" y="1" width="838" height="458" rx="16" ry="16" fill="none" stroke="#00d4ff" stroke-width="1" class="border"/>

  <!-- Floating Particles -->
  <circle cx="120" cy="100" r="1.5" fill="#00d4ff" class="particle" style="animation-delay:0s"/>
  <circle cx="300" cy="350" r="1" fill="#7c3aed" class="particle" style="animation-delay:2s"/>
  <circle cx="500" cy="150" r="1.2" fill="#00d4ff" class="particle" style="animation-delay:4s"/>
  <circle cx="700" cy="300" r="0.8" fill="#a855f7" class="particle" style="animation-delay:1s"/>
  <circle cx="750" cy="80" r="1" fill="#00d4ff" class="particle" style="animation-delay:3s"/>
  <circle cx="200" cy="400" r="1.3" fill="#7c3aed" class="particle" style="animation-delay:5s"/>
  <circle cx="600" cy="420" r="0.9" fill="#00d4ff" class="particle" style="animation-delay:6s"/>

  <!-- Title -->
  <text x="420" y="45" text-anchor="middle" class="title" filter="url(#glow)">⚡ TECH STACK PROFICIENCY</text>
  <line x1="100" y1="58" x2="740" y2="58" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>

  <!-- ===== LEFT COLUMN ===== -->
  <!-- Python 95% -->
  <g class="row" style="animation-delay:0.2s">
    <text x="40" y="84" class="label">Python</text>
    <text x="390" y="84" text-anchor="end" class="pct" fill="#3572A5">95%</text>
    <rect x="40" y="90" width="360" height="8" rx="4" class="track"/>
    <rect x="40" y="90" width="342" height="8" rx="4" fill="url(#g0)" clip-path="url(#clip0)"/>
    <circle cx="382" cy="94" r="3" fill="#3572A5" class="dot" style="animation-delay:1.8s"><animate attributeName="opacity" from="0" to="0.5" dur="0.01s" begin="1.8s" fill="freeze"/></circle>
  </g>

  <!-- TypeScript 90% -->
  <g class="row" style="animation-delay:0.3s">
    <text x="40" y="124" class="label">TypeScript</text>
    <text x="390" y="124" text-anchor="end" class="pct" fill="#3178C6">90%</text>
    <rect x="40" y="130" width="360" height="8" rx="4" class="track"/>
    <rect x="40" y="130" width="324" height="8" rx="4" fill="url(#g1)" clip-path="url(#clip1)"/>
    <circle cx="364" cy="134" r="3" fill="#3178C6" class="dot" style="animation-delay:1.9s"/>
  </g>

  <!-- JavaScript 88% -->
  <g class="row" style="animation-delay:0.4s">
    <text x="40" y="164" class="label">JavaScript</text>
    <text x="390" y="164" text-anchor="end" class="pct" fill="#F7DF1E">88%</text>
    <rect x="40" y="170" width="360" height="8" rx="4" class="track"/>
    <rect x="40" y="170" width="317" height="8" rx="4" fill="url(#g2)" clip-path="url(#clip2)"/>
    <circle cx="357" cy="174" r="3" fill="#F7DF1E" class="dot" style="animation-delay:2.0s"/>
  </g>

  <!-- Rust 78% -->
  <g class="row" style="animation-delay:0.5s">
    <text x="40" y="204" class="label">Rust</text>
    <text x="390" y="204" text-anchor="end" class="pct" fill="#DEA584">78%</text>
    <rect x="40" y="210" width="360" height="8" rx="4" class="track"/>
    <rect x="40" y="210" width="281" height="8" rx="4" fill="url(#g3)" clip-path="url(#clip3)"/>
    <circle cx="321" cy="214" r="3" fill="#DEA584" class="dot" style="animation-delay:2.1s"/>
  </g>

  <!-- Go 75% -->
  <g class="row" style="animation-delay:0.6s">
    <text x="40" y="244" class="label">Go</text>
    <text x="390" y="244" text-anchor="end" class="pct" fill="#00ADD8">75%</text>
    <rect x="40" y="250" width="360" height="8" rx="4" class="track"/>
    <rect x="40" y="250" width="270" height="8" rx="4" fill="url(#g4)" clip-path="url(#clip4)"/>
    <circle cx="310" cy="254" r="3" fill="#00ADD8" class="dot" style="animation-delay:2.2s"/>
  </g>

  <!-- ===== RIGHT COLUMN ===== -->
  <!-- React 92% -->
  <g class="row" style="animation-delay:0.25s">
    <text x="440" y="84" class="label">React</text>
    <text x="790" y="84" text-anchor="end" class="pct" fill="#61DAFB">92%</text>
    <rect x="440" y="90" width="360" height="8" rx="4" class="track"/>
    <rect x="440" y="90" width="331" height="8" rx="4" fill="url(#g5)" clip-path="url(#clip5)"/>
    <circle cx="771" cy="94" r="3" fill="#61DAFB" class="dot" style="animation-delay:1.85s"/>
  </g>

  <!-- Node.js 85% -->
  <g class="row" style="animation-delay:0.35s">
    <text x="440" y="124" class="label">Node.js</text>
    <text x="790" y="124" text-anchor="end" class="pct" fill="#339933">85%</text>
    <rect x="440" y="130" width="360" height="8" rx="4" class="track"/>
    <rect x="440" y="130" width="306" height="8" rx="4" fill="url(#g6)" clip-path="url(#clip6)"/>
    <circle cx="746" cy="134" r="3" fill="#339933" class="dot" style="animation-delay:1.95s"/>
  </g>

  <!-- Docker 80% -->
  <g class="row" style="animation-delay:0.45s">
    <text x="440" y="164" class="label">Docker</text>
    <text x="790" y="164" text-anchor="end" class="pct" fill="#2496ED">80%</text>
    <rect x="440" y="170" width="360" height="8" rx="4" class="track"/>
    <rect x="440" y="170" width="288" height="8" rx="4" fill="url(#g7)" clip-path="url(#clip7)"/>
    <circle cx="728" cy="174" r="3" fill="#2496ED" class="dot" style="animation-delay:2.05s"/>
  </g>

  <!-- Kubernetes 70% -->
  <g class="row" style="animation-delay:0.55s">
    <text x="440" y="204" class="label">Kubernetes</text>
    <text x="790" y="204" text-anchor="end" class="pct" fill="#326CE5">70%</text>
    <rect x="440" y="210" width="360" height="8" rx="4" class="track"/>
    <rect x="440" y="210" width="252" height="8" rx="4" fill="url(#g8)" clip-path="url(#clip8)"/>
    <circle cx="692" cy="214" r="3" fill="#326CE5" class="dot" style="animation-delay:2.15s"/>
  </g>

  <!-- PostgreSQL 82% -->
  <g class="row" style="animation-delay:0.65s">
    <text x="440" y="244" class="label">PostgreSQL</text>
    <text x="790" y="244" text-anchor="end" class="pct" fill="#4169E1">82%</text>
    <rect x="440" y="250" width="360" height="8" rx="4" class="track"/>
    <rect x="440" y="250" width="295" height="8" rx="4" fill="url(#g9)" clip-path="url(#clip9)"/>
    <circle cx="735" cy="254" r="3" fill="#4169E1" class="dot" style="animation-delay:2.25s"/>
  </g>

  <!-- Separator -->
  <line x1="50" y1="285" x2="790" y2="285" stroke="rgba(0,212,255,0.08)" stroke-width="1"/>

  <!-- Bottom section - Score Summary -->
  <g class="row" style="animation-delay:0.8s">
    <!-- Left column average -->
    <rect x="40" y="300" width="370" height="130" rx="12" fill="rgba(255,255,255,0.02)" stroke="rgba(0,212,255,0.08)" stroke-width="1"/>
    <text x="225" y="330" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#8892b0" letter-spacing="2">LANGUAGES</text>
    <text x="225" y="380" text-anchor="middle" font-family="'SFMono-Regular',Consolas,monospace" font-size="42" font-weight="700" fill="#00d4ff" filter="url(#glow)">85.2</text>
    <text x="225" y="410" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#8892b0">Average Proficiency Score</text>

    <!-- Right column average -->
    <rect x="430" y="300" width="370" height="130" rx="12" fill="rgba(255,255,255,0.02)" stroke="rgba(124,58,237,0.08)" stroke-width="1"/>
    <text x="615" y="330" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="12" fill="#8892b0" letter-spacing="2">FRAMEWORKS &amp; TOOLS</text>
    <text x="615" y="380" text-anchor="middle" font-family="'SFMono-Regular',Consolas,monospace" font-size="42" font-weight="700" fill="#7c3aed" filter="url(#glow)">81.8</text>
    <text x="615" y="410" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#8892b0">Average Proficiency Score</text>
  </g>
</svg>
