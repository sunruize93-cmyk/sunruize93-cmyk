<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480" viewBox="0 0 480 480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/><stop offset="100%" stop-color="#0d1537"/>
    </linearGradient>
    <linearGradient id="sG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="pg"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="dg"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    @keyframes drawP { 0% { stroke-dashoffset:800; } 100% { stroke-dashoffset:0; } }
    @keyframes fadeIn { 0% { opacity:0; } 100% { opacity:1; } }
    @keyframes pulse { 0%,100% { opacity:0.6;r:4; } 50% { opacity:1;r:6; } }
    @keyframes fillF { 0% { fill-opacity:0; } 100% { fill-opacity:0.15; } }
    @keyframes borderP { 0%,100% { stroke-opacity:0.15; } 50% { stroke-opacity:0.3; } }
    .grid { stroke:rgba(0,212,255,0.08); stroke-width:1; fill:none; }
    .axis { stroke:rgba(0,212,255,0.12); stroke-width:1; }
    .dpoly { fill:rgba(0,212,255,0.15); stroke:#00d4ff; stroke-width:2; stroke-dasharray:800; animation:drawP 2s ease-out 0.5s both; }
    .dfill { fill:rgba(0,212,255,0.15); stroke:none; animation:fillF 1s ease-out 2s both; fill-opacity:0; }
    .vertex { animation: pulse 2.5s ease-in-out infinite; }
    .lbl { font-family:'Segoe UI',system-ui,sans-serif; font-size:12px; fill:#e0e6f0; animation:fadeIn 0.5s ease-out both; }
    .score { font-family:'SFMono-Regular',Consolas,monospace; font-size:11px; fill:#00d4ff; font-weight:600; animation:fadeIn 0.5s ease-out both; }
    .border { animation: borderP 4s ease-in-out infinite; }
  </style>

  <rect x="1" y="1" width="478" height="478" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="478" height="478" rx="16" fill="none" stroke="#00d4ff" stroke-width="1" class="border"/>

  <!-- B+ Grade Ring -->
  <circle cx="240" cy="62" r="28" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="5"/>
  <circle cx="240" cy="62" r="28" fill="none" stroke="url(#sG)" stroke-width="5" stroke-dasharray="176" stroke-dashoffset="35" stroke-linecap="round"/>
  <text x="240" y="69" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="18" font-weight="800" fill="#ffffff" filter="url(#glow)">B</text>
  <text x="240" y="105" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="10" font-weight="700" fill="#8892b0" letter-spacing="1">DEVELOPER RANK</text>

  <polygon points="240.0,218.8 262.7,231.9 262.7,258.1 240.0,271.2 217.3,258.1 217.3,231.9" class="grid"/>
  <polygon points="240.0,192.5 285.5,218.8 285.5,271.2 240.0,297.5 194.5,271.2 194.5,218.8" class="grid"/>
  <polygon points="240.0,166.2 308.2,205.6 308.2,284.4 240.0,323.8 171.8,284.4 171.8,205.6" class="grid"/>
  <polygon points="240.0,140.0 330.9,192.5 330.9,297.5 240.0,350.0 149.1,297.5 149.1,192.5" class="grid"/>

  <line x1="240" y1="245" x2="240.0" y2="140.0" class="axis"/>
  <line x1="240" y1="245" x2="330.9" y2="192.5" class="axis"/>
  <line x1="240" y1="245" x2="330.9" y2="297.5" class="axis"/>
  <line x1="240" y1="245" x2="240.0" y2="350.0" class="axis"/>
  <line x1="240" y1="245" x2="149.1" y2="297.5" class="axis"/>
  <line x1="240" y1="245" x2="149.1" y2="192.5" class="axis"/>

  <polygon points="240.0,166.2 258.2,234.5 323.7,293.3 240.0,350.0 230.9,250.2 185.4,213.5" class="dfill"/>
  <polygon points="240.0,166.2 258.2,234.5 323.7,293.3 240.0,350.0 230.9,250.2 185.4,213.5" class="dpoly" filter="url(#pg)"/>
  <circle cx="240.0" cy="166.2" r="4" fill="#00d4ff" class="vertex" filter="url(#dg)" style="animation-delay:0.0s"/>
  <circle cx="258.2" cy="234.5" r="4" fill="#00d4ff" class="vertex" filter="url(#dg)" style="animation-delay:0.3s"/>
  <circle cx="323.7" cy="293.3" r="4" fill="#00d4ff" class="vertex" filter="url(#dg)" style="animation-delay:0.6s"/>
  <circle cx="240.0" cy="350.0" r="4" fill="#00d4ff" class="vertex" filter="url(#dg)" style="animation-delay:0.8999999999999999s"/>
  <circle cx="230.9" cy="250.2" r="4" fill="#00d4ff" class="vertex" filter="url(#dg)" style="animation-delay:1.2s"/>
  <circle cx="185.4" cy="213.5" r="4" fill="#00d4ff" class="vertex" filter="url(#dg)" style="animation-delay:1.5s"/>

  <text x="240.0" y="113.8" text-anchor="middle" class="lbl" style="animation-delay:0.5s">Frontend</text>
  <text x="240.0" y="127.8" text-anchor="middle" class="score" style="animation-delay:0.6s">75</text>
  <text x="353.7" y="179.4" text-anchor="start" class="lbl" style="animation-delay:0.6s">Backend</text>
  <text x="353.7" y="193.4" text-anchor="start" class="score" style="animation-delay:0.7s">20</text>
  <text x="353.7" y="310.6" text-anchor="start" class="lbl" style="animation-delay:0.7s">Productivity</text>
  <text x="353.7" y="324.6" text-anchor="start" class="score" style="animation-delay:0.8s">92</text>
  <text x="240.0" y="376.2" text-anchor="middle" class="lbl" style="animation-delay:0.8s">Stars</text>
  <text x="240.0" y="390.2" text-anchor="middle" class="score" style="animation-delay:0.9s">26</text>
  <text x="126.3" y="310.6" text-anchor="end" class="lbl" style="animation-delay:0.9s">Collaboration</text>
  <text x="126.3" y="324.6" text-anchor="end" class="score" style="animation-delay:1.0s">10</text>
  <text x="126.3" y="179.4" text-anchor="end" class="lbl" style="animation-delay:1.0s">Breadth</text>
  <text x="126.3" y="193.4" text-anchor="end" class="score" style="animation-delay:1.1s">60</text>


  <line x1="140" y1="415" x2="340" y2="415" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
  <text x="240" y="435" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#8892b0" letter-spacing="2">OVERALL</text>
  <text x="240" y="456" text-anchor="middle" font-family="'SFMono-Regular',Consolas,monospace" font-size="22" font-weight="700" fill="url(#sG)" filter="url(#glow)">59.5 / 100</text>
</svg>