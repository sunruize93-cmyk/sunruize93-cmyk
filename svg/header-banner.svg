<svg xmlns="http://www.w3.org/2000/svg" width="840" height="240" viewBox="0 0 840 240">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#0d1537"/>
      <stop offset="100%" stop-color="#1a0a3e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="20%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="80%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="badgeBg1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(0,212,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(124,58,237,0.12)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <style>
    @keyframes float1 { 0%,100% { transform: translate(0,0) rotate(0deg); } 50% { transform: translate(12px,-18px) rotate(180deg); } }
    @keyframes float2 { 0%,100% { transform: translate(0,0) rotate(0deg); } 50% { transform: translate(-15px,12px) rotate(-120deg); } }
    @keyframes float3 { 0%,100% { transform: translate(0,0) rotate(0deg); } 50% { transform: translate(8px,15px) rotate(90deg); } }
    @keyframes float4 { 0%,100% { transform: translate(0,0) rotate(0deg); } 50% { transform: translate(-10px,-10px) rotate(200deg); } }
    @keyframes float5 { 0%,100% { transform: translate(0,0) rotate(0deg); } 50% { transform: translate(18px,8px) rotate(-150deg); } }
    @keyframes shimmer { 0% { stop-color: #00d4ff; } 33% { stop-color: #a855f7; } 66% { stop-color: #7c3aed; } 100% { stop-color: #00d4ff; } }
    @keyframes fadeInUp { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes twinkle { 0%,100% { opacity: 0.2; r: 1; } 50% { opacity: 1; r: 2; } }
    @keyframes twinkle2 { 0%,100% { opacity: 0.1; r: 0.8; } 50% { opacity: 0.9; r: 1.8; } }
    @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    @keyframes borderPulse { 0%,100% { stroke-opacity: 0.15; } 50% { stroke-opacity: 0.35; } }
    @keyframes shimmerLine { 0% { stroke-dashoffset: 600; } 100% { stroke-dashoffset: 0; } }
    .shape { opacity: 0.08; }
    .s1 { animation: float1 12s ease-in-out infinite; }
    .s2 { animation: float2 15s ease-in-out infinite; }
    .s3 { animation: float3 10s ease-in-out infinite; }
    .s4 { animation: float4 14s ease-in-out infinite; }
    .s5 { animation: float5 11s ease-in-out infinite; }
    .s6 { animation: float1 16s ease-in-out infinite 2s; }
    .s7 { animation: float2 13s ease-in-out infinite 1s; }
    .s8 { animation: float3 17s ease-in-out infinite 3s; }
    .s9 { animation: float4 9s ease-in-out infinite 1.5s; }
    .star { animation: twinkle 3s ease-in-out infinite; }
    .star2 { animation: twinkle2 4s ease-in-out infinite; }
    .title-shimmer stop { animation: shimmer 4s ease-in-out infinite; }
    .badge { animation: fadeInUp 0.8s ease-out both; }
    .badge1 { animation-delay: 0.6s; }
    .badge2 { animation-delay: 0.8s; }
    .badge3 { animation-delay: 1.0s; }
    .subtitle { animation: fadeInUp 0.6s ease-out 0.2s both; }
    .tagline { animation: fadeInUp 0.6s ease-out 0.4s both; }
    .greeting { animation: fadeInUp 0.6s ease-out 0s both; }
    .main-border { animation: borderPulse 4s ease-in-out infinite; }
    .divider { animation: shimmerLine 2s ease-out 0.5s both; stroke-dasharray: 600; stroke-dashoffset: 600; }
  </style>

  <!-- Main Background -->
  <rect x="1" y="1" width="838" height="238" rx="16" ry="16" fill="url(#bgGrad)"/>
  <rect x="1" y="1" width="838" height="238" rx="16" ry="16" fill="none" stroke="#00d4ff" stroke-width="1" class="main-border"/>

  <!-- Floating Geometric Shapes -->
  <!-- Hexagons -->
  <g class="shape s1"><polygon points="80,30 95,22 110,30 110,46 95,54 80,46" fill="none" stroke="#00d4ff" stroke-width="1"/></g>
  <g class="shape s2"><polygon points="720,50 735,42 750,50 750,66 735,74 720,66" fill="none" stroke="#7c3aed" stroke-width="1"/></g>
  <g class="shape s6"><polygon points="650,180 662,173 674,180 674,194 662,201 650,194" fill="none" stroke="#a855f7" stroke-width="0.8"/></g>
  <!-- Circles -->
  <g class="shape s3"><circle cx="150" cy="190" r="12" fill="none" stroke="#7c3aed" stroke-width="0.8"/></g>
  <g class="shape s7"><circle cx="700" cy="140" r="8" fill="none" stroke="#00d4ff" stroke-width="0.8"/></g>
  <g class="shape s9"><circle cx="50" cy="120" r="10" fill="none" stroke="#a855f7" stroke-width="0.6"/></g>
  <!-- Diamonds -->
  <g class="shape s4"><polygon points="760,160 770,150 780,160 770,170" fill="none" stroke="#00d4ff" stroke-width="0.8"/></g>
  <g class="shape s5"><polygon points="60,60 68,52 76,60 68,68" fill="none" stroke="#7c3aed" stroke-width="0.8"/></g>
  <g class="shape s8"><polygon points="200,40 210,30 220,40 210,50" fill="none" stroke="#00d4ff" stroke-width="0.6"/></g>

  <!-- Twinkling Stars -->
  <circle cx="120" cy="45" r="1" fill="#00d4ff" class="star" style="animation-delay:0s"/>
  <circle cx="230" cy="25" r="1.2" fill="#a855f7" class="star2" style="animation-delay:1.2s"/>
  <circle cx="340" cy="55" r="0.8" fill="#00d4ff" class="star" style="animation-delay:0.5s"/>
  <circle cx="450" cy="30" r="1" fill="#7c3aed" class="star2" style="animation-delay:2s"/>
  <circle cx="560" cy="45" r="1.3" fill="#00d4ff" class="star" style="animation-delay:0.8s"/>
  <circle cx="670" cy="35" r="0.9" fill="#a855f7" class="star2" style="animation-delay:1.5s"/>
  <circle cx="780" cy="50" r="1.1" fill="#00d4ff" class="star" style="animation-delay:0.3s"/>
  <circle cx="100" cy="200" r="1" fill="#7c3aed" class="star" style="animation-delay:1.8s"/>
  <circle cx="250" cy="210" r="0.8" fill="#00d4ff" class="star2" style="animation-delay:2.5s"/>
  <circle cx="400" cy="220" r="1.2" fill="#a855f7" class="star" style="animation-delay:0.7s"/>
  <circle cx="600" cy="200" r="1" fill="#00d4ff" class="star2" style="animation-delay:1.1s"/>
  <circle cx="740" cy="210" r="0.9" fill="#7c3aed" class="star" style="animation-delay:2.2s"/>
  <circle cx="500" cy="15" r="1" fill="#00d4ff" class="star" style="animation-delay:1.4s"/>
  <circle cx="180" cy="130" r="0.7" fill="#a855f7" class="star2" style="animation-delay:0.9s"/>
  <circle cx="660" cy="110" r="0.8" fill="#00d4ff" class="star" style="animation-delay:1.7s"/>
  <circle cx="300" cy="180" r="1" fill="#7c3aed" class="star2" style="animation-delay:2.8s"/>
  <circle cx="520" cy="190" r="0.6" fill="#00d4ff" class="star" style="animation-delay:0.4s"/>

  <!-- Greeting Text -->
  <text x="420" y="68" text-anchor="middle" font-family="'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace" font-size="16" fill="#00d4ff" filter="url(#glow)" class="greeting">&lt; Hello World /&gt;</text>

  <!-- Main Title -->
  <text x="420" y="108" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="36" font-weight="800" fill="url(#titleGrad)" filter="url(#softGlow)" letter-spacing="4" class="subtitle">DEVELOPER SCOREBOARD</text>

  <!-- Tagline -->
  <text x="420" y="135" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="14" fill="#8892b0" class="tagline">Full-Stack Developer  •  Open Source Enthusiast  •  Problem Solver</text>

  <!-- Gradient Divider -->
  <line x1="170" y1="152" x2="670" y2="152" stroke="url(#dividerGrad)" stroke-width="1.5" class="divider"/>

  <!-- Badges -->
  <g class="badge badge1">
    <rect x="218" y="168" width="120" height="32" rx="16" ry="16" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
    <text x="278" y="189" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#e2e8f0">🏆 A+ Rating</text>
  </g>
  <g class="badge badge2">
    <rect x="358" y="168" width="120" height="32" rx="16" ry="16" fill="rgba(124,58,237,0.08)" stroke="rgba(124,58,237,0.2)" stroke-width="1"/>
    <text x="418" y="189" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#e2e8f0">📊 Top 5%</text>
  </g>
  <g class="badge badge3">
    <rect x="498" y="168" width="140" height="32" rx="16" ry="16" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
    <text x="568" y="189" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#e2e8f0">⚡ 99.9% Uptime</text>
  </g>
</svg>
