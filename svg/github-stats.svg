<svg xmlns="http://www.w3.org/2000/svg" width="840" height="260" viewBox="0 0 840 260">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#0d1537"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="goldGlow"><feGaussianBlur stdDeviation="4" result="b"/><feFlood flood-color="#FFD700" flood-opacity="0.3"/><feComposite in2="b" operator="in" result="glow"/><feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="greenGlow"><feGaussianBlur stdDeviation="4" result="b"/><feFlood flood-color="#00ff88" flood-opacity="0.3"/><feComposite in2="b" operator="in" result="glow"/><feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="purpleGlow"><feGaussianBlur stdDeviation="4" result="b"/><feFlood flood-color="#7c3aed" flood-opacity="0.3"/><feComposite in2="b" operator="in" result="glow"/><feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="cyanGlow"><feGaussianBlur stdDeviation="4" result="b"/><feFlood flood-color="#00d4ff" flood-opacity="0.3"/><feComposite in2="b" operator="in" result="glow"/><feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="coralGlow"><feGaussianBlur stdDeviation="4" result="b"/><feFlood flood-color="#ff6b6b" flood-opacity="0.3"/><feComposite in2="b" operator="in" result="glow"/><feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes countUp {
      0% { opacity: 0; transform: scale(0.5) translateY(10px); }
      60% { opacity: 1; transform: scale(1.05) translateY(-2px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    @keyframes dataStream {
      0% { transform: translateX(-40px); opacity: 0; }
      20% { opacity: 0.6; }
      80% { opacity: 0.6; }
      100% { transform: translateX(880px); opacity: 0; }
    }
    @keyframes borderPulse { 0%,100% { stroke-opacity: 0.15; } 50% { stroke-opacity: 0.3; } }
    .border { animation: borderPulse 4s ease-in-out infinite; }
    .stat-box { animation: fadeInUp 0.6s ease-out both; }
    .stat-value { animation: countUp 0.8s ease-out both; }
    .stat-glow { animation: glowPulse 3s ease-in-out infinite; }
    .dot { animation: dataStream 4s linear infinite; }
  </style>

  <!-- Background -->
  <rect x="1" y="1" width="838" height="258" rx="16" ry="16" fill="url(#bgGrad)"/>
  <rect x="1" y="1" width="838" height="258" rx="16" ry="16" fill="none" stroke="#00d4ff" stroke-width="1" class="border"/>

  <!-- Title -->
  <text x="420" y="38" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="18" font-weight="700" letter-spacing="3" fill="url(#titleGrad)" filter="url(#glow)">📊 GITHUB ANALYTICS</text>
  <line x1="100" y1="52" x2="740" y2="52" stroke="rgba(0,212,255,0.08)" stroke-width="1"/>

  <!-- ===== STAT BOXES ===== -->
  <!-- Box 1: Total Stars -->
  <g class="stat-box" style="animation-delay: 0.2s">
    <rect x="28" y="68" width="148" height="145" rx="12" fill="rgba(255,215,0,0.03)" stroke="rgba(255,215,0,0.1)" stroke-width="1"/>
    <text x="102" y="102" text-anchor="middle" font-size="28">⭐</text>
    <text x="102" y="145" text-anchor="middle" font-family="'SFMono-Regular',Consolas,monospace" font-size="30" font-weight="800" fill="#ffffff" class="stat-value" style="animation-delay:0.5s" filter="url(#goldGlow)">2.4K</text>
    <text x="102" y="170" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#8892b0" letter-spacing="1">Total Stars</text>
    <rect x="58" y="185" width="88" height="3" rx="1.5" fill="rgba(255,215,0,0.15)"/>
    <rect x="58" y="185" width="88" height="3" rx="1.5" fill="#FFD700" opacity="0.4" class="stat-glow"/>
  </g>

  <!-- Box 2: Total Commits -->
  <g class="stat-box" style="animation-delay: 0.35s">
    <rect x="192" y="68" width="148" height="145" rx="12" fill="rgba(0,255,136,0.03)" stroke="rgba(0,255,136,0.1)" stroke-width="1"/>
    <text x="266" y="102" text-anchor="middle" font-size="28">🔥</text>
    <text x="266" y="145" text-anchor="middle" font-family="'SFMono-Regular',Consolas,monospace" font-size="28" font-weight="800" fill="#ffffff" class="stat-value" style="animation-delay:0.65s" filter="url(#greenGlow)">3,847</text>
    <text x="266" y="170" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#8892b0" letter-spacing="1">Commits</text>
    <rect x="222" y="185" width="88" height="3" rx="1.5" fill="rgba(0,255,136,0.15)"/>
    <rect x="222" y="185" width="88" height="3" rx="1.5" fill="#00ff88" opacity="0.4" class="stat-glow" style="animation-delay:0.5s"/>
  </g>

  <!-- Box 3: Pull Requests -->
  <g class="stat-box" style="animation-delay: 0.5s">
    <rect x="356" y="68" width="148" height="145" rx="12" fill="rgba(124,58,237,0.03)" stroke="rgba(124,58,237,0.1)" stroke-width="1"/>
    <text x="430" y="102" text-anchor="middle" font-size="28">🔀</text>
    <text x="430" y="145" text-anchor="middle" font-family="'SFMono-Regular',Consolas,monospace" font-size="30" font-weight="800" fill="#ffffff" class="stat-value" style="animation-delay:0.8s" filter="url(#purpleGlow)">524</text>
    <text x="430" y="170" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#8892b0" letter-spacing="1">Pull Requests</text>
    <rect x="386" y="185" width="88" height="3" rx="1.5" fill="rgba(124,58,237,0.15)"/>
    <rect x="386" y="185" width="88" height="3" rx="1.5" fill="#7c3aed" opacity="0.4" class="stat-glow" style="animation-delay:1s"/>
  </g>

  <!-- Box 4: Issues Resolved -->
  <g class="stat-box" style="animation-delay: 0.65s">
    <rect x="520" y="68" width="148" height="145" rx="12" fill="rgba(0,212,255,0.03)" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>
    <text x="594" y="102" text-anchor="middle" font-size="28">✅</text>
    <text x="594" y="145" text-anchor="middle" font-family="'SFMono-Regular',Consolas,monospace" font-size="30" font-weight="800" fill="#ffffff" class="stat-value" style="animation-delay:0.95s" filter="url(#cyanGlow)">312</text>
    <text x="594" y="170" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#8892b0" letter-spacing="1">Issues Resolved</text>
    <rect x="550" y="185" width="88" height="3" rx="1.5" fill="rgba(0,212,255,0.15)"/>
    <rect x="550" y="185" width="88" height="3" rx="1.5" fill="#00d4ff" opacity="0.4" class="stat-glow" style="animation-delay:1.5s"/>
  </g>

  <!-- Box 5: Contributions -->
  <g class="stat-box" style="animation-delay: 0.8s">
    <rect x="684" y="68" width="148" height="145" rx="12" fill="rgba(255,107,107,0.03)" stroke="rgba(255,107,107,0.1)" stroke-width="1"/>
    <text x="758" y="102" text-anchor="middle" font-size="28">📈</text>
    <text x="758" y="145" text-anchor="middle" font-family="'SFMono-Regular',Consolas,monospace" font-size="28" font-weight="800" fill="#ffffff" class="stat-value" style="animation-delay:1.1s" filter="url(#coralGlow)">1,205</text>
    <text x="758" y="170" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#8892b0" letter-spacing="1">Contributions</text>
    <rect x="714" y="185" width="88" height="3" rx="1.5" fill="rgba(255,107,107,0.15)"/>
    <rect x="714" y="185" width="88" height="3" rx="1.5" fill="#ff6b6b" opacity="0.4" class="stat-glow" style="animation-delay:2s"/>
  </g>

  <!-- Data Stream at bottom -->
  <g>
    <circle cx="0" cy="237" r="1.5" fill="#00d4ff" class="dot" style="animation-delay:0s"/>
    <circle cx="0" cy="237" r="1" fill="#7c3aed" class="dot" style="animation-delay:0.5s"/>
    <circle cx="0" cy="237" r="1.5" fill="#00d4ff" class="dot" style="animation-delay:1s"/>
    <circle cx="0" cy="237" r="0.8" fill="#a855f7" class="dot" style="animation-delay:1.5s"/>
    <circle cx="0" cy="237" r="1.2" fill="#00d4ff" class="dot" style="animation-delay:2s"/>
    <circle cx="0" cy="237" r="1" fill="#7c3aed" class="dot" style="animation-delay:2.5s"/>
    <circle cx="0" cy="237" r="1.5" fill="#00d4ff" class="dot" style="animation-delay:3s"/>
    <circle cx="0" cy="237" r="0.8" fill="#a855f7" class="dot" style="animation-delay:3.5s"/>
    <circle cx="0" cy="237" r="1.2" fill="#00ff88" class="dot" style="animation-delay:0.3s"/>
    <circle cx="0" cy="237" r="1" fill="#FFD700" class="dot" style="animation-delay:0.8s"/>
    <circle cx="0" cy="237" r="1.5" fill="#ff6b6b" class="dot" style="animation-delay:1.3s"/>
    <circle cx="0" cy="237" r="0.8" fill="#00d4ff" class="dot" style="animation-delay:1.8s"/>
    <circle cx="0" cy="237" r="1" fill="#7c3aed" class="dot" style="animation-delay:2.3s"/>
    <circle cx="0" cy="237" r="1.2" fill="#00d4ff" class="dot" style="animation-delay:2.8s"/>
    <circle cx="0" cy="237" r="0.8" fill="#a855f7" class="dot" style="animation-delay:3.3s"/>
  </g>
</svg>
